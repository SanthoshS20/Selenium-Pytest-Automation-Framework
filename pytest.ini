[pytest]

addopts =
    -v
    --env qa
    -n 5
    --alluredir reports/allure-reports
    --self-contained-html

testpaths = tests

python_files = test_*.py

python_classes = Test*

python_functions = test_*

markers =
    smoke: Smoke test suite
    sanity: Sanity test suite
    regression: Regression test suite
    ui: UI automation tests
    api: API automation tests

; log_cli = true
; log_cli_level = INFO

; log_file_level = INFO
; log_file_format = %(asctime)s | %(levelname)-8s | %(name)s | %(filename)s:%(lineno)d | %(message)s  
